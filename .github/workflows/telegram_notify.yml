name: CI/CD Merge Notification

on:
  push:
    branches:
      - main # Chạy khi code được merge/push vào nhánh main (hoặc master)

jobs:
  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Send Telegram Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *🚀 CODE ĐÃ ĐƯỢC MERGE THÀNH CÔNG!*
            
            👤 *Người thực hiện:* `${{ github.actor }}`
            📁 *Repository:* `${{ github.repository }}`
            🌿 *Branch:* `${{ github.ref_name }}`
            📝 *Nội dung Commit:* 
            > ${{ github.event.head_commit.message }}
            
            🔗 [Xem chi tiết trên GitHub](<${{ github.event.head_commit.url }}>)
